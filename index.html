<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latitude</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #1a1a18;
    --teal:     #1a6b5e;
    --teal-mid: #a8cdc7;
    --paper:    #f8f7f4;
    --border:   #e2dfd9;
    --serif: 'Playfair Display', Georgia, serif;
    --sans:  'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px;
    position: relative;
    overflow: hidden;
  }

  /* ghosted background lettermark */
  .bg-mark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--serif);
    font-size: clamp(140px, 22vw, 300px);
    font-weight: 500;
    color: transparent;
    -webkit-text-stroke: 1px var(--border);
    letter-spacing: -6px;
    white-space: nowrap;
    user-select: none;
    pointer-events: none;
    opacity: 0;
    animation: appear 1.6s ease forwards;
  }

  /* center content */
  .center {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    opacity: 0;
    animation: rise 1s ease 0.6s forwards;
  }

  .logo {
    font-family: var(--serif);
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 400;
    letter-spacing: -1px;
    color: var(--ink);
  }
  .logo span { color: var(--teal); }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--teal-mid);
  }

  .wip {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--teal);
  }

  /* footer */
  footer {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: #b0ada8;
    letter-spacing: 0.04em;
  }

  @keyframes appear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .bg-mark, .center { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<div class="bg-mark" aria-hidden="true">Latitude</div>

<div class="center">
  <p class="logo">Latitude<span>.</span></p>
  <div class="divider" aria-hidden="true"></div>
  <p class="wip">Work in progress</p>
</div>

<footer>© 2026 Latitude</footer>

</body>
</html>
